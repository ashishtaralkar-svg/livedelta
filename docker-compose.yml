services:
  revbreakbot:
    build: .
    image: deltabot:latest
    container_name: revbreakbot
    restart: always
    env_file:
      - .env.revbreak
    volumes:
      - ./state:/app/state
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    stop_grace_period: 30s

  # NOT YET ACTIVE -- uncomment once .env.heikinashi is filled in with the
  # Delta SUB-ACCOUNT's own API key/secret (copy .env.heikinashi.example ->
  # .env.heikinashi first). Runs on separate capital from revbreakbot above,
  # so the two can never collide on position ownership.
  heikinashibot:
    build: .
    image: deltabot:latest
    container_name: heikinashibot
    restart: always
    env_file:
      - .env.heikinashi
    volumes:
      - ./state:/app/state
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    stop_grace_period: 30s

  # Dchannel bot -- runs on its OWN Delta SUB-ACCOUNT, in parallel with
  # revbreakbot which it NEVER touches (separate capital, separate
  # DELTA_STATE_FILE=state/dchannel_pos.json). Fill .env.dchannel first
  # (cp .env.dchannel.example .env.dchannel, add the sub-account API keys).
  # Bring it up ALONE so the running revbreakbot is not recreated:
  #   docker compose up -d --build dchannelbot
  dchannelbot:
    build: .
    image: deltabot:latest
    container_name: dchannelbot
    restart: always
    env_file:
      - .env.dchannel
    volumes:
      - ./state:/app/state
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    stop_grace_period: 30s

  # DCv2 bot -- runs on its OWN Delta SUB-ACCOUNT, in parallel with the other
  # bots which it NEVER touches (separate capital, DELTA_STATE_FILE=state/dcv2_pos.json).
  # Fill .env.dcv2 first (cp .env.dcv2.example .env.dcv2, add the sub-account API
  # keys). Bring it up ALONE so the other running bots are not recreated:
  #   docker compose up -d --build dcv2bot
  dcv2bot:
    build: .
    image: deltabot:latest
    container_name: dcv2bot
    restart: always
    env_file:
      - .env.dcv2
    volumes:
      - ./state:/app/state
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    stop_grace_period: 30s

  # DCv3 bot -- DCv2's signal logic but BUYS options instead of selling
  # (the mirror of dcv2bot), on its OWN Delta SUB-ACCOUNT, in parallel with
  # dcv2bot/the other bots which it NEVER touches (separate capital,
  # DELTA_STATE_FILE=state/dcv3_pos.json). Fill .env.dcv3 first (cp
  # .env.dcv3.example .env.dcv3, add the sub-account API keys). Bring it up
  # ALONE so the other running bots are not recreated:
  #   docker compose up -d --build dcv3bot
  dcv3bot:
    build: .
    image: deltabot:latest
    container_name: dcv3bot
    restart: always
    env_file:
      - .env.dcv3
    volumes:
      - ./state:/app/state
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    stop_grace_period: 30s

  # DCv2-SIM shadow bot -- runs the SAME DCv2 strategy CLOSED-BAR (the backtest
  # model) but places NO real orders (DELTA_PAPER_MODE=true). It posts
  # [DCv2-SIM] signals to Telegram so you can compare the model against the live
  # dcv2bot in real time. Uses NO capital and can reuse any read-capable key.
  # Fill .env.dcv2sim first. Bring it up ALONE:
  #   docker compose up -d --build dcv2simbot
  dcv2simbot:
    build: .
    image: deltabot:latest
    container_name: dcv2simbot
    restart: always
    env_file:
      - .env.dcv2sim
    volumes:
      - ./state:/app/state
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    stop_grace_period: 30s
