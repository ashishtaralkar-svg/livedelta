services:
  revbreakbot:
    build: .
    image: deltabot:latest
    container_name: revbreakbot
    restart: always
    env_file:
      - .env.revbreak
    volumes:
      - ./state:/app/state
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    stop_grace_period: 30s

  # NOT YET ACTIVE -- uncomment once .env.heikinashi is filled in with the
  # Delta SUB-ACCOUNT's own API key/secret (copy .env.heikinashi.example ->
  # .env.heikinashi first). Runs on separate capital from revbreakbot above,
  # so the two can never collide on position ownership.
  heikinashibot:
    build: .
    image: deltabot:latest
    container_name: heikinashibot
    restart: always
    env_file:
      - .env.heikinashi
    volumes:
      - ./state:/app/state
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    stop_grace_period: 30s

  # Dchannel bot -- runs on its OWN Delta SUB-ACCOUNT, in parallel with
  # revbreakbot which it NEVER touches (separate capital, separate
  # DELTA_STATE_FILE=state/dchannel_pos.json). Fill .env.dchannel first
  # (cp .env.dchannel.example .env.dchannel, add the sub-account API keys).
  # Bring it up ALONE so the running revbreakbot is not recreated:
  #   docker compose up -d --build dchannelbot
  dchannelbot:
    build: .
    image: deltabot:latest
    container_name: dchannelbot
    restart: always
    env_file:
      - .env.dchannel
    volumes:
      - ./state:/app/state
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    stop_grace_period: 30s

  # DCv2 bot -- runs on its OWN Delta SUB-ACCOUNT, in parallel with the other
  # bots which it NEVER touches (separate capital, DELTA_STATE_FILE=state/dcv2_pos.json).
  # Fill .env.dcv2 first (cp .env.dcv2.example .env.dcv2, add the sub-account API
  # keys). Bring it up ALONE so the other running bots are not recreated:
  #   docker compose up -d --build dcv2bot
  dcv2bot:
    build: .
    image: deltabot:latest
    container_name: dcv2bot
    restart: always
    env_file:
      - .env.dcv2
    volumes:
      - ./state:/app/state
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    stop_grace_period: 30s
